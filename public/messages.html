<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Saved Contact Messages</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 40px; }
    h1 { text-align: center; color: #1e293b; }
    table { width: 100%; max-width: 1000px; margin: 30px auto; border-collapse: collapse; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #2563eb; color: white; text-transform: uppercase; font-size: 13px; }
    tr:hover { background: #f1f5f9; }
    #status { text-align: center; color: #64748b; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>📩 Saved Contact Messages</h1>
  <table id="messagesTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Website Link</th>
        <th>Message</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <p id="status">Loading...</p>

  <script>
    fetch("/api/contact")
      .then((res) => res.json())
      .then((data) => {
        const tbody = document.getElementById("tableBody");
        const status = document.getElementById("status");

        if (!data.length) {
          status.textContent = "No messages found yet.";
          return;
        }

        status.textContent = `Total messages: ${data.length}`;

        data.forEach((item) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.email}</td>
            <td>${item.websiteLink}</td>
            <td>${item.message}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch((err) => {
        document.getElementById("status").textContent = "Error loading messages.";
        console.error(err);
      });
  </script>
</body>
</html>
